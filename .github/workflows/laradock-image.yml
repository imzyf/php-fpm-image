name: laradock-image

on:
  workflow_dispatch: {}
  schedule:
    - cron: "0 0 * * 0"

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        php_version: ["8.5"]
        image: [php-fpm, php-worker, workspace]
    steps:
      -
        name: Checkout
        uses: actions/checkout@v4
      -
        # .env.laradock holds every image's ARG defaults (merged from all three
        # Dockerfiles); .env.laradock.preference overrides a subset of them with
        # this project's chosen values. Merge the two (preference wins) and pass
        # the result straight through as build-args.
        name: Merge build args from .env.laradock + .env.laradock.preference
        id: build-args
        run: |
          declare -A args
          for f in .env.laradock .env.laradock.preference; do
            while IFS= read -r line; do
              line="${line%%#*}"
              line="$(printf '%s' "${line}" | sed -e 's/[[:space:]]*$//')"
              [ -z "${line}" ] && continue
              name="${line%%=*}"
              value="${line#*=}"
              args["${name}"]="${value}"
            done < "${f}"
          done
          {
            echo 'args<<EOF'
            for name in "${!args[@]}"; do
              echo "${name}=${args[${name}]}"
            done
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"
      -
        name: Compute tag
        id: tags
        run: |
          echo "tag=yifans/phpdock:${{ matrix.php_version }}-${{ matrix.image }}" >> "$GITHUB_OUTPUT"
      -
        name: Set up QEMU
        uses: docker/setup-qemu-action@v3
      -
        name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      -
        name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      -
        name: Build and push Docker images
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.image }}
          file: ${{ matrix.image }}/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: ${{ github.repository == 'imzyf/phpdock-images' }}
          tags: ${{ steps.tags.outputs.tag }}
          build-args: |
            ${{ steps.build-args.outputs.args }}
            LARADOCK_PHP_VERSION=${{ matrix.php_version }}
